name: Build and Deploy 11ty

on:
  push:
    branches:
      - main
      - staging
  schedule:
    - cron: '0 6 * * *'      # Daily rebuild at 6:00 UTC (8:00 CET / 7:00 GMT)
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild-schedule]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            src/_data/*.cache.json
          key: sheet-data-${{ runner.os }}
          restore-keys: |
            sheet-data-
      
      - name: Restore student images cache
        uses: actions/cache@v4
        with:
          path: .cache/student-images
          key: student-images-${{ runner.os }}
          restore-keys: |
            student-images-
      
      - name: Clean and build CSS
        run: |
          npm run clean
          npm run build:css
        env:
          PATH_PREFIX: /transpersonaltraining/
      
      - name: Restore cached student images into _site
        run: |
          if [ -d ".cache/student-images" ] && [ "$(ls -A .cache/student-images 2>/dev/null)" ]; then
            mkdir -p _site/assets/images/people/students
            cp -r .cache/student-images/* _site/assets/images/people/students/
            echo "✅ Restored $(ls _site/assets/images/people/students/ | wc -l) cached student images"
          fi
      
      - name: Build Eleventy
        run: npm run build:eleventy
        env:
          PATH_PREFIX: /transpersonaltraining/
      
      - name: Update student images cache
        run: |
          if [ -d "_site/assets/images/people/students" ] && [ "$(ls -A _site/assets/images/people/students 2>/dev/null)" ]; then
            mkdir -p .cache/student-images
            rsync -a _site/assets/images/people/students/ .cache/student-images/
          fi
      
      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: deploy
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
